<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
   <script>document.getElementById('loadingScreen').style.display = 'none';</script>
    <div class="toast-container" id="toastContainer"></div>
    <button class="scroll-to-top" id="scrollToTop"><i class="fa-solid fa-arrow-up"></i></button>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg width="45" height="45" viewBox="0 0 45 45"><rect x="2" y="2" width="41" height="41" rx="10" fill="#4f46e5"/><text x="22.5" y="30" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="Arial">م</text></svg>
                <span>موقعنا</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">الرئيسية</a></li>
                <li><a href="about.html" class="nav-link">من نحن</a></li>
                <li><a href="services.html" class="nav-link">الخدمات</a></li>
                <li><a href="portfolio.html" class="nav-link">معرض الأعمال</a></li>
                <li><a href="blog.html" class="nav-link">المدونة</a></li>
                <li><a href="contact.html" class="nav-link">اتصل بنا</a></li>
                <li><a href="profile.html" class="nav-link active">الملف الشخصي</a></li>
                <li id="navLogoutBtn" style="display:none;"><a href="#" class="nav-link" onclick="handleLogout()">تسجيل الخروج</a></li>
            </ul>
            <div class="nav-actions">
                <button class="dark-mode-toggle" id="darkModeToggle"><i class="fa-solid fa-moon"></i></button>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <section class="profile-section section-padding">
        <div class="container">
            <div class="profile-grid">
                <!-- Sidebar -->
                <aside class="profile-sidebar">
                    <div class="profile-avatar-wrapper">
                        <div class="profile-avatar" id="profileAvatar">م</div>
                        <h3 id="profileDisplayName">المستخدم</h3>
                        <span id="profileUsername">@username</span>
                    </div>
                    <ul class="profile-nav">
                        <li><button class="profile-nav-btn active" data-tab="info"><i class="fa-solid fa-user"></i> المعلومات الشخصية</button></li>
                        <li><button class="profile-nav-btn" data-tab="edit"><i class="fa-solid fa-pen-to-square"></i> تعديل البيانات</button></li>
                        <li><button class="profile-nav-btn" data-tab="password"><i class="fa-solid fa-key"></i> تغيير كلمة المرور</button></li>
                    </ul>
                </aside>
                <!-- Main Content -->
                <div class="profile-content">
                    <!-- Tab: Info -->
                    <div class="profile-tab active" id="tab-info">
                        <h2>المعلومات الشخصية</h2>
                        <div class="profile-info-grid">
                            <div class="profile-info-item"><span class="info-label">الاسم الكامل</span><span class="info-value" id="infoFullName">-</span></div>
                            <div class="profile-info-item"><span class="info-label">اسم المستخدم</span><span class="info-value" id="infoUsername">-</span></div>
                            <div class="profile-info-item"><span class="info-label">البريد الإلكتروني</span><span class="info-value" id="infoEmail">-</span></div>
                            <div class="profile-info-item"><span class="info-label">تاريخ التسجيل</span><span class="info-value" id="infoDate">-</span></div>
                        </div>
                    </div>
                    <!-- Tab: Edit -->
                    <div class="profile-tab" id="tab-edit">
                        <h2>تعديل البيانات</h2>
                        <form id="profileEditForm" novalidate>
                            <div class="form-group">
                                <label for="editFullName">الاسم الكامل</label>
                                <input type="text" id="editFullName" required minlength="3">
                                <span class="error-message" id="editFullNameError"></span>
                            </div>
                            <div class="form-group">
                                <label for="editEmail">البريد الإلكتروني</label>
                                <input type="email" id="editEmail" required>
                                <span class="error-message" id="editEmailError"></span>
                            </div>
                            <button type="submit" class="btn btn-primary">حفظ التغييرات <i class="fa-solid fa-floppy-disk"></i></button>
                        </form>
                    </div>
                    <!-- Tab: Password -->
                    <div class="profile-tab" id="tab-password">
                        <h2>تغيير كلمة المرور</h2>
                        <form id="passwordChangeForm" novalidate>
                            <div class="form-group">
                                <label for="currentPassword">كلمة المرور الحالية</label>
                                <input type="password" id="currentPassword" required minlength="6">
                                <span class="error-message" id="currentPasswordError"></span>
                            </div>
                            <div class="form-group">
                                <label for="newPassword">كلمة المرور الجديدة</label>
                                <input type="password" id="newPassword" required minlength="6">
                                <span class="error-message" id="newPasswordError"></span>
                            </div>
                            <div class="form-group">
                                <label for="confirmNewPassword">تأكيد كلمة المرور الجديدة</label>
                                <input type="password" id="confirmNewPassword" required minlength="6">
                                <span class="error-message" id="confirmNewPasswordError"></span>
                            </div>
                            <button type="submit" class="btn btn-primary">تغيير كلمة المرور <i class="fa-solid fa-check"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 موقعنا. جميع الحقوق محفوظة.</p></div></div>
    </footer>

    <script src="main.js"></script>
    <script src="validation.js"></script>
    <script src="auth.js"></script>
    <script src="profile.js"></script>
</body>
</html>
