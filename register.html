<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <script>document.getElementById('loadingScreen').style.display = 'none';</script>
    <button class="scroll-to-top" id="scrollToTop"><i class="fa-solid fa-arrow-up"></i></button>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg width="45" height="45" viewBox="0 0 45 45"><rect x="2" y="2" width="41" height="41" rx="10" fill="#4f46e5"/><text x="22.5" y="30" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="Arial">م</text></svg>
                <span>موقعنا</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">الرئيسية</a></li>
                <li><a href="about.html" class="nav-link">من نحن</a></li>
                <li><a href="services.html" class="nav-link">الخدمات</a></li>
                <li><a href="portfolio.html" class="nav-link">معرض الأعمال</a></li>
                <li><a href="blog.html" class="nav-link">المدونة</a></li>
                <li><a href="contact.html" class="nav-link">اتصل بنا</a></li>
                <li><a href="login.html" class="nav-link btn-nav-login">تسجيل الدخول</a></li>
            </ul>
            <div class="nav-actions">
                <button class="dark-mode-toggle" id="darkModeToggle"><i class="fa-solid fa-moon"></i></button>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fa-solid fa-user-plus"></i></div>
                    <h2>إنشاء حساب جديد</h2>
                    <p>أنشئ حسابك للاستفادة من جميع خدماتنا المميزة</p>
                </div>
                <form class="auth-form" id="registerForm" novalidate>
                    <div class="form-group">
                        <label for="fullName">الاسم الكامل</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="fullName" placeholder="أحمد محمد" required minlength="3">
                        </div>
                        <span class="error-message" id="fullNameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="username">اسم المستخدم</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-at"></i>
                            <input type="text" id="username" placeholder="username123" required minlength="3">
                        </div>
                        <span class="error-message" id="usernameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">البريد الإلكتروني</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="example@email.com" required>
                        </div>
                        <span class="error-message" id="regEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">كلمة المرور</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
                            <button type="button" class="toggle-password" data-target="regPassword"><i class="fa-solid fa-eye"></i></button>
                        </div>
                        <span class="error-message" id="regPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">تأكيد كلمة المرور</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
                            <button type="button" class="toggle-password" data-target="confirmPassword"><i class="fa-solid fa-eye"></i></button>
                        </div>
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">إنشاء حساب <i class="fa-solid fa-user-plus"></i></button>
                </form>
                <div class="auth-switch">
                    لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 موقعنا. جميع الحقوق محفوظة.</p></div></div></footer>

    <script src="main.js"></script>
    <script src="validation.js"></script>
    <script src="auth.js"></script>
</body>
</html>
