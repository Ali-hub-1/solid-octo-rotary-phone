<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - موقعنا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <script>document.getElementById('loadingScreen').style.display = 'none';</script>
    <div class="toast-container" id="toastContainer"></div>
    <button class="scroll-to-top" id="scrollToTop" title="العودة للأعلى"><i class="fa-solid fa-arrow-up"></i></button>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg width="45" height="45" viewBox="0 0 45 45"><rect x="2" y="2" width="41" height="41" rx="10" fill="#4f46e5"/><text x="22.5" y="30" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="Arial">م</text></svg>
                <span>موقعنا</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link">الرئيسية</a></li>
                <li><a href="about.html" class="nav-link">من نحن</a></li>
                <li><a href="services.html" class="nav-link">الخدمات</a></li>
                <li><a href="portfolio.html" class="nav-link">معرض الأعمال</a></li>
                <li><a href="blog.html" class="nav-link">المدونة</a></li>
                <li><a href="contact.html" class="nav-link">اتصل بنا</a></li>
                <li><a href="profile.html" class="nav-link">الملف الشخصي</a></li>
                <li><a href="register.html" class="nav-link btn-nav-register">إنشاء حساب</a></li>
            </ul>
            <div class="nav-actions">
                <button class="dark-mode-toggle" id="darkModeToggle" title="الوضع الليلي"><i class="fa-solid fa-moon"></i></button>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon"><i class="fa-solid fa-right-to-bracket"></i></div>
                    <h2>تسجيل الدخول</h2>
                    <p>مرحبًا بعودتك! أدخل بياناتك للوصول إلى حسابك</p>
                </div>
                <form class="auth-form" id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="loginEmail">البريد الإلكتروني</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="example@email.com" required>
                        </div>
                        <span class="error-message" id="loginEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">كلمة المرور</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6">
                            <button type="button" class="toggle-password" data-target="loginPassword"><i class="fa-solid fa-eye"></i></button>
                        </div>
                        <span class="error-message" id="loginPasswordError"></span>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe"> تذكرني
                        </label>
                        <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">تسجيل الدخول <i class="fa-solid fa-arrow-left"></i></button>
                </form>
                <div class="auth-switch">
                    ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer" id="footer">
        <div class="container">
            <div class="footer-bottom"><p>&copy; 2026 موقعنا. جميع الحقوق محفوظة.</p></div>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="validation.js"></script>
    <script src="auth.js"></script>
</body>
</html>
